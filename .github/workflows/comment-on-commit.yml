name: Comment on Commit with Generated Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  comment-on-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get commit message
        run: |
          echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Find generated image
        run: |
          IMAGE_NAME=$(ls images | tail -n 1)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build image URL
        run: |
          IMAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/images/${{ env.IMAGE_NAME }}"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Comment on commit
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = context.sha;

            const message = process.env.MESSAGE;
            const imageUrl = process.env.IMAGE_URL;

            const body = `
            ## 🖼️ Image générée automatiquement

            📝 **Message du commit :** ${message}

            📷 **Image générée :**

            ![Image générée](${imageUrl})
            `;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: body
            });