name: Comment on Commit with Generated Image

on:
  workflow_run:
    workflows:
      - Generate Image from Commit
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  comment-on-commit:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download generated image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-generee
          path: ./artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Get image name
        run: |
          IMAGE_NAME=$(ls ./artifacts | head -n 1)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build image URL
        run: |
          IMAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/images/${{ env.IMAGE_NAME }}"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = context.payload.workflow_run.head_sha;
            const imageUrl = process.env.IMAGE_URL;

            const body = `
            ## 🖼️ Image générée automatiquement

            📷 **Image générée :**

            ![Image générée](${imageUrl})
            `;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body
            });