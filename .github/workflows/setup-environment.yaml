name: Installer les outils

on:
    push:
        branches:
            - main

jobs:
    setup-dependances:
        runs-on: ubuntu-latest
        steps:
            - name: Cloner le dépôt github
              uses: actions/checkout@v4

            - name: Installer node.js
              uses: actions/setup-node@v2
              with:
                  node-version: '18'
            - name: Installer python
              uses: actions/setup-python@v2
              with:
                  python-version: '3.10'

            - name: Vérifier les installations
              run: echo "Node.js version:" $(node -v) && echo "Python version:" $(python --version)