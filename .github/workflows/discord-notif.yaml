name: Discord Notification Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Get commit message
        run: |
          cd main-repo
          echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages-repo

      - name: Find latest generated image
        run: |
          IMAGE_NAME=$(ls pages-repo/images/image-*.jpg | sort -V | tail -n 1 | xargs basename)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "Dernière image trouvée : $IMAGE_NAME"

      - name: Build image URL
        run: |
          IMAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/images/${{ env.IMAGE_NAME }}"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          echo "Image URL: $IMAGE_URL"

      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"📝 Nouveau commit: ${{ env.MESSAGE }}\n📷 Image générée : ${{ env.IMAGE_URL }}\"
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}