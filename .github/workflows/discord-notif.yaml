name: Discord Notification Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get commit message
        run: |
          echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Find generated image
        run: |
          IMAGE_NAME=$(ls images | head -n 1)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build image URL
        run: |
          IMAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/images/${{ env.IMAGE_NAME }}"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          echo "Image URL: $IMAGE_URL"

      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"📝 Nouveau commit : ${{ env.MESSAGE }}\n📷 Image générée : ${{ env.IMAGE_URL }}\"
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}