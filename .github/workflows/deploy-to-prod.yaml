# Nom du workflow
name: Deploiement Automatique en Production

# Declenchement du workflow sur chaque push sur "main"
on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet un declenchement manuel

# Definition des jobs
jobs:
  deploy:
    runs-on: ubuntu-latest # Utilise un serveur Linux GitHub Actions
    steps:
      - name: Cloner le depot GitHub
        uses: actions/checkout@v4 # Telecharge le code source du projet

      - name: Installer les dependances
        run: |
          npm install # Exemple pour un projet Node.js
          npm run build # Genere les fichiers de production

      - name: Configurer la cle SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copier les fichiers sur le serveur de production
        run: |
          scp -o StrictHostKeyChecking=no -r ./dist/* ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }}:/var/www/app/

      - name: Redemarrer l'application sur le serveur
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
          cd /var/www/app/
          pm2 restart app # Commande pour redemarrer une application Node.js
          echo "Application redemarree avec succes !"
          EOF