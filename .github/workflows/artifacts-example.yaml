name: gestion des artefacts

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    generate-files:
      runs-on: ubuntu-latest
      steps:
        - name: cloner le dépôt github
          uses: actions/checkout@v4

        - name: Générer un fichier texte
          run: echo "Ceci est un artefact généré" > artefact.txt

        - name: Sauvegarder le fichier en tant qu'artefact
          uses: actions/upload-artifact@v3
          with:
            name: fichier-genere
            path: artefact.txt

    use-artefacts:
        runs-on: ubuntu-latest
        needs: generate-files
        steps:
          - name: Télécharger l'artefact
            uses: actions/download-artifact@v3
            with:
              name: fichier-genere
              path: ./artefacts

          - name: Afficher le contenu de l'artefact
            run: cat ./artefacts/artefact.txt